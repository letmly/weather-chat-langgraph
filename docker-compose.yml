services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      CHAT_DB_PATH: /data/chat.db
    volumes:
      - chatdb:/data
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  chatdb:
