services:
  backend:
    container_name: weatherchat-backend
    build: ../backend
    env_file: ../.env
    environment:
      CHAT_DB_PATH: /data/chat.db
      LOG_LEVEL: INFO
    volumes:
      - chatdb:/data
    restart: unless-stopped
    networks:
      - internal

  frontend:
    container_name: weatherchat
    build:
      context: ../frontend
      args:
        # Пусто — фронт ходит на /chat относительно, nginx проксирует на backend
        VITE_API_URL: ""
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal
      - gateway-net

volumes:
  chatdb:

networks:
  internal:
  gateway-net:
    external: true
